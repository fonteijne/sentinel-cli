version: '3.9'

# Sentinel Command Center Dashboard
# Run alongside the main sentinel docker-compose.yml
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dashboard.yml up -d
#   or standalone:
#   docker compose -f docker-compose.dashboard.yml up -d

services:
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: sentinel-dashboard
    restart: unless-stopped
    ports:
      # Dashboard accessible at http://localhost:3000
      - "3000:8000"
    volumes:
      # Mount config directory (shared with sentinel container)
      # Allows the dashboard to read/write config.yaml and config.local.yaml
      - ./config:/app/config:rw
      # Mount .env.local for auth management
      - ./config/.env.local:/app/config/.env.local:rw
      # Mount sentinel-workspaces for worktree count queries
      - sentinel-workspaces:/workspaces:ro
      # Docker socket — allows dashboard to check running containers
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # SSH keys (read-only — for status check)
      - ~/.ssh:/root/.ssh:ro
    environment:
      # Forward env vars from host .env file
      - JIRA_URL=${JIRA_URL:-}
      - JIRA_EMAIL=${JIRA_EMAIL:-}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      - GITLAB_URL=${GITLAB_URL:-}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_MODE=${CLAUDE_MODE:-}
      - WORKSPACE_ROOT=/workspaces
    env_file:
      # Load from config/.env.local if it exists
      - path: ./config/.env.local
        required: false
      - path: ./config/.env
        required: false
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "com.sentinel.component=dashboard"
      - "com.sentinel.version=1.0.0"

networks:
  sentinel-net:
    driver: bridge

volumes:
  sentinel-workspaces:
    external: true
    name: sentinel_sentinel-workspaces
