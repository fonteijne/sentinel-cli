services:
  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: sentinel
    volumes:
      # Mount workspace directory for persistent workspaces
      - sentinel-workspaces:/workspaces
      # Mount config for runtime configuration changes
      - ./config:/app/config:ro
      # Mount Claude credentials if using Claude Code subscription
      - ~/.claude:/root/.claude:ro
    environment:
      # Jira Configuration
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      - JIRA_EMAIL=${JIRA_EMAIL}
      - JIRA_BASE_URL=${JIRA_BASE_URL}
      # GitLab Configuration
      - GITLAB_API_TOKEN=${GITLAB_API_TOKEN}
      - GITLAB_BASE_URL=${GITLAB_BASE_URL}
      # LLM Configuration (optional - for direct API or proxy)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      # Workspace
      - WORKSPACE_ROOT=/workspaces
    # Interactive mode for CLI usage
    stdin_open: true
    tty: true
    # Keep container running for exec usage
    entrypoint: []
    command: ["sleep", "infinity"]
    # Network access for API calls
    network_mode: bridge

  # Development variant with source mounted
  sentinel-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: sentinel-dev
    volumes:
      # Mount source code for live development
      - .:/app
      - sentinel-workspaces:/workspaces
      - ~/.claude:/root/.claude:ro
    environment:
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      - JIRA_EMAIL=${JIRA_EMAIL}
      - JIRA_BASE_URL=${JIRA_BASE_URL}
      - GITLAB_API_TOKEN=${GITLAB_API_TOKEN}
      - GITLAB_BASE_URL=${GITLAB_BASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - WORKSPACE_ROOT=/workspaces
    stdin_open: true
    tty: true
    entrypoint: []
    command: ["sleep", "infinity"]
    network_mode: bridge
    profiles:
      - dev

volumes:
  sentinel-workspaces:
    driver: local
