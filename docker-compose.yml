services:
  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: sentinel
    volumes:
      # Mount workspace directory for persistent workspaces
      - sentinel-workspaces:/workspaces
      # Shared volume for project code — child containers mount this same volume
      # to access worktree code (solves the DooD volume path problem)
      - sentinel-projects:/workspace/projects
      # Docker socket mount — DooD (Docker-out-of-Docker)
      # Allows Sentinel to start sibling containers via the host Docker daemon
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount config for runtime configuration changes (read-only)
      - ./config:/app/config:ro
      # Mount .env.local as writable for sentinel auth configure
      - ./config/.env.local:/app/config/.env.local:rw
      # Mount SSH keys for git operations over SSH (bypasses HTTP auth proxy)
      - ~/.ssh:/root/.ssh:ro
      # Uncomment below if using Claude Code subscription mode (not API key):
      # - ~/.claude:/root/.claude:ro
    environment:
      # Workspace root (container path)
      - WORKSPACE_ROOT=/workspaces
      # Docker host for DooD
      - DOCKER_HOST=unix:///var/run/docker.sock
      # Note: Jira, GitLab, and LLM credentials are loaded from
      # the mounted config/.env file by the application
    # Interactive mode for CLI usage
    stdin_open: true
    tty: true
    # Keep container running for exec usage
    entrypoint: []
    command: ["sleep", "infinity"]
    # Network access for API calls
    network_mode: bridge

  # Development variant with source mounted
  sentinel-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: sentinel-dev
    volumes:
      # Mount source code for live development
      - .:/app
      - sentinel-workspaces:/workspaces
      - sentinel-projects:/workspace/projects
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount .env.local as writable for sentinel auth configure
      - ./config/.env.local:/app/config/.env.local:rw
      # Mount SSH keys for git operations over SSH (bypasses HTTP auth proxy)
      - ~/.ssh:/root/.ssh:ro
      # Uncomment below if using Claude Code subscription mode (not API key):
      # - ~/.claude:/root/.claude:ro
    environment:
      - WORKSPACE_ROOT=/workspaces
      - DOCKER_HOST=unix:///var/run/docker.sock
      # Hardcoded true — dev always wants /docs reachable at
      # `http://localhost:8787/docs`. Prod (sentinel-serve) is
      # independently hardcoded to false so the two can't collide via a
      # shared .env entry.
      - SENTINEL_ENABLE_DOCS=true
    stdin_open: true
    tty: true
    entrypoint: []
    # Start the backend so `http://localhost:8787/docs` is reachable from the
    # host browser. Override in docker-compose.override.yml if you prefer
    # `sleep infinity` + manual `docker exec ... sentinel serve`.
    command: ["sentinel", "serve", "--host", "0.0.0.0", "--i-know-what-im-doing", "--port", "8787"]
    # Host-loopback ONLY — NEVER 0.0.0.0:8787. The 127.0.0.1: prefix is
    # load-bearing: publishing to 0.0.0.0 would expose the dev backend to
    # anything on the machine's network. The 0.0.0.0 bind *inside* the
    # container is fine because the host publish is scoped to loopback.
    ports:
      - "127.0.0.1:8787:8787"
    # `network_mode: bridge` keeps dev isolated from sentinel-edge. If you
    # want the dev container to reach a running Traefik (to test routing
    # end-to-end from inside the dev shell), drop this line and add
    # `networks: [default, sentinel-edge]` like sentinel-serve.
    network_mode: bridge
    profiles:
      - dev

  # Production backend service — profile-gated so bare `docker compose up`
  # retains today's CLI-idle `sentinel` behaviour. Host reachability is
  # Traefik's job; this service never publishes a host port directly.
  sentinel-serve:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: sentinel-serve
    profiles:
      - serve
    # The `app` image has ENTRYPOINT ["sentinel"]; command: is argv[1:], so
    # do NOT repeat `sentinel` here (Click would interpret the duplicate as
    # a subcommand and fail with `No such command 'sentinel'`).
    command: ["serve", "--host", "0.0.0.0", "--i-know-what-im-doing", "--port", "8787"]
    volumes:
      - sentinel-workspaces:/workspaces
      - sentinel-projects:/workspace/projects
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/app/config:ro
      - ./config/.env.local:/app/config/.env.local:rw
      - ~/.ssh:/root/.ssh:ro
    environment:
      - WORKSPACE_ROOT=/workspaces
      - DOCKER_HOST=unix:///var/run/docker.sock
      # Hardcoded false — prod schema-leaking is a security issue, and a
      # shared `SENTINEL_ENABLE_DOCS=true` in `.env` (intended for dev)
      # would otherwise silently enable /docs here too. To *temporarily*
      # expose /docs in prod, use a `docker-compose.override.yml` (see
      # docs/deploy.md §7) rather than a global `.env` flag.
      - SENTINEL_ENABLE_DOCS=false
      - SENTINEL_SERVICE_TOKEN=${SENTINEL_SERVICE_TOKEN:-}
    networks:
      - default
      - sentinel-edge
    restart: unless-stopped
    healthcheck:
      # /health is unauthenticated by plan 05 design so no token needed here.
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8787/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      # Traefik starts with exposedByDefault=false, so only services that
      # opt in via traefik.enable=true get routed. Matches the BYO-Traefik
      # contract: operators point their own Traefik at sentinel-edge and
      # these labels still apply.
      #
      # Requires Traefik >= 3.6.1 (the bundled image is pinned there) —
      # older Traefik versions hardcode Docker API v1.24 which Docker
      # Engine 29.x+ refuses. A BYO Traefik older than 3.6.1 will need
      # either an upgrade, the DOCKER_API_VERSION env workaround, or a
      # file-provider config pointing at http://sentinel-serve:8787.
      - "traefik.enable=true"
      - "traefik.docker.network=sentinel-edge"
      - "traefik.http.routers.sentinel.rule=Host(`${SENTINEL_HOSTNAME:?SENTINEL_HOSTNAME required}`)"
      - "traefik.http.routers.sentinel.entrypoints=websecure"
      - "traefik.http.routers.sentinel.tls=true"
      - "traefik.http.routers.sentinel.tls.certresolver=le"
      - "traefik.http.routers.sentinel.middlewares=sentinel-ipallow@docker"
      - "traefik.http.middlewares.sentinel-ipallow.ipallowlist.sourcerange=87.255.37.187/32"
      # Cloudflare orange-cloud sits in front. Exclude CF edge IPs when reading
      # X-Forwarded-For so the middleware resolves the real client IP instead
      # of whichever Cloudflare PoP happened to handle the request. Ranges from
      # https://www.cloudflare.com/ips-v4 and /ips-v6 — refresh if Cloudflare
      # publishes a new CIDR (rare, but not never).
      - "traefik.http.middlewares.sentinel-ipallow.ipallowlist.ipstrategy.excludedips=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32"
      - "traefik.http.services.sentinel.loadbalancer.server.port=8787"

  # Bundled Traefik reverse proxy — profile-gated so operators with an
  # existing Traefik can opt out. They attach their Traefik to sentinel-edge
  # manually; the labels on sentinel-serve still apply.
  traefik:
    # v3.6.1+ is REQUIRED: earlier Traefik hardcoded Docker API v1.24 which
    # Docker Engine 29.x+ refuses (MinAPIVersion 1.44). PR
    # https://github.com/traefik/traefik/pull/12256 unpinned the client and
    # switched to moby's WithAPIVersionNegotiation(). Pinning the 3.6 minor
    # tag picks up patch updates while staying on a known-compatible line.
    image: traefik:v3.6
    container_name: sentinel-traefik
    profiles:
      - traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-acme:/acme
    networks:
      - sentinel-edge
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=sentinel-edge
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Trust Cloudflare edges as forwarded-headers sources so X-Forwarded-For
      # and X-Forwarded-Proto survive into the middleware chain. Without this,
      # Traefik would strip XFF from the CF connection and the ipallowlist
      # middleware would only see a Cloudflare edge IP.
      - --entrypoints.web.forwardedheaders.trustedips=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32
      - --entrypoints.websecure.forwardedheaders.trustedips=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL:?LETSENCRYPT_EMAIL required}
      - --certificatesresolvers.le.acme.storage=/acme/acme.json
      - --accesslog=true
      - --log.level=INFO

volumes:
  sentinel-workspaces:
    driver: local
  sentinel-projects:
    driver: local
  traefik-acme:
    driver: local

networks:
  # Shared edge network. Compose creates and destroys it with the stack.
  # BYO-Traefik operators attach their Traefik via
  #   docker network connect sentinel-edge <their-traefik>
  # AFTER compose has brought the stack up. IMPORTANT: those operators must
  # use `docker compose stop` (not `down`) — `down` removes this network and
  # disconnects any externally-attached container. Fresh `up` re-creates it.
  # The explicit `name:` keeps the network name stable (no project prefix)
  # so the Traefik labels' `docker.network=sentinel-edge` always matches.
  sentinel-edge:
    name: sentinel-edge
