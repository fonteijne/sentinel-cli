services:
  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: sentinel
    volumes:
      # Mount workspace directory for persistent workspaces
      - sentinel-workspaces:/workspaces
      # Shared volume for project code — child containers mount this same volume
      # to access worktree code (solves the DooD volume path problem)
      - sentinel-projects:/workspace/projects
      # Docker socket mount — DooD (Docker-out-of-Docker)
      # Allows Sentinel to start sibling containers via the host Docker daemon
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount config for runtime configuration changes (read-only)
      - ./config:/app/config:ro
      # Mount SSH keys for git operations over SSH (bypasses HTTP auth proxy)
      - ~/.ssh:/root/.ssh:ro
      # Uncomment below if using Claude Code subscription mode (not API key):
      # - ~/.claude:/root/.claude:ro
    environment:
      # Workspace root (container path)
      - WORKSPACE_ROOT=/workspaces
      # Docker host for DooD
      - DOCKER_HOST=unix:///var/run/docker.sock
      # Note: Jira, GitLab, and LLM credentials are loaded from
      # the mounted config/.env file by the application
    # Interactive mode for CLI usage
    stdin_open: true
    tty: true
    # Keep container running for exec usage
    entrypoint: []
    command: ["sleep", "infinity"]
    networks:
      - sentinel-net

  # ─── Command Center Dashboard ────────────────────────────────────
  # Accessible at http://localhost:3000
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: sentinel-dashboard
    restart: unless-stopped
    ports:
      - "3000:8000"
    volumes:
      # Shared config with sentinel container
      - ./config:/app/config:rw
      # Read workspaces for worktree count queries
      - sentinel-workspaces:/workspaces:ro
      # Docker socket for container status checks
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # SSH keys for status checks
      - ~/.ssh:/root/.ssh:ro
    environment:
      - JIRA_URL=${JIRA_URL:-}
      - JIRA_EMAIL=${JIRA_EMAIL:-}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      - GITLAB_URL=${GITLAB_URL:-}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_MODE=${CLAUDE_MODE:-}
      - WORKSPACE_ROOT=/workspaces
    env_file:
      - path: ./config/.env.local
        required: false
      - path: ./config/.env
        required: false
    networks:
      - sentinel-net
    depends_on:
      - sentinel
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "com.sentinel.component=dashboard"
      - "com.sentinel.version=1.0.0"

  # ─── Development variant ─────────────────────────────────────────
  # Usage: docker compose --profile dev up -d
  sentinel-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: sentinel-dev
    volumes:
      # Mount source code for live development
      - .:/app
      - sentinel-workspaces:/workspaces
      - sentinel-projects:/workspace/projects
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount SSH keys for git operations over SSH (bypasses HTTP auth proxy)
      - ~/.ssh:/root/.ssh:ro
      # Uncomment below if using Claude Code subscription mode (not API key):
      # - ~/.claude:/root/.claude:ro
    environment:
      - WORKSPACE_ROOT=/workspaces
      - DOCKER_HOST=unix:///var/run/docker.sock
    stdin_open: true
    tty: true
    entrypoint: []
    command: ["sleep", "infinity"]
    networks:
      - sentinel-net
    profiles:
      - dev

networks:
  sentinel-net:
    driver: bridge

volumes:
  sentinel-workspaces:
    driver: local
  sentinel-projects:
    driver: local
