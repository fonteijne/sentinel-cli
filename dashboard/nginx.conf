# Sentinel dashboard — static SPA served by nginx.
#
# The SPA itself is single-origin static assets. All API/WS traffic goes
# directly from the browser to the FastAPI backend (configured on the
# first-load splash) — this server never proxies API calls.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't cache index.html — bundle hashes change on every build, and
    # the entry point must always reflect the latest deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Hashed Vite assets are content-addressed; safe to cache aggressively.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path is a client-side route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lightweight liveness probe for compose healthcheck / k8s.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
