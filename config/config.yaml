version: '1.0'
# YAML anchor: shared across Drupal agents so a single edit updates both
# drupal_developer.environment and drupal_reviewer.environment.
x-drupal-environment: &drupal_environment
  core_version: "11.1.3"
  php_version: "8.3"
  key_contrib: "paragraphs, webform, search_api"
  ci_pipeline: "GitLab CI"
  compliance: "GDPR, WCAG 2.2 AA"
workspace:
  root_dir: ~/sentinel-workspaces
  plans_dir: .agents/plans
  memory_dir: .agents/memory
agents:
  plan_generator:
    model: claude-opus-4-5
    temperature: 0.3
  python_developer:
    model: claude-4-5-sonnet
    temperature: 0.2
    specializations:
    - python
    - pydantic-ai
    - fastapi
    - postgresql
  drupal_developer:
    model: claude-4-5-sonnet
    temperature: 0.2
    specializations:
    - drupal
    - php
    - phpunit
    environment:
      <<: *drupal_environment
      local_dev: "Lando"
      theme: "custom Starterkit-based"
  security_review:
    model: claude-4-5-sonnet
    temperature: 0.1
    strictness: 5
    veto_power: true
  drupal_reviewer:
    model: claude-4-5-sonnet
    temperature: 0.1
    veto_power: true
    environment:
      <<: *drupal_environment
      hosting: "Lando"
      shell: "fish"
  confidence_evaluator:
    model: claude-4-5-sonnet
    temperature: 0.1
    allowed_tools: []
  project_profiler:
    model: claude-4-5-sonnet
    temperature: 0.2
attachments:
  enabled: true
  max_text_size: 102400     # 100KB per text file
  max_image_size: 5242880   # 5MB per image
  max_total_size: 20971520  # 20MB total
  max_count: 20
iteration_limits:
  max_iterations: 5
  retry_on_failure: 2
beads:
  auto_create: true
  task_prefix: sentinel
guardrails:
  enabled: true
  timeout_seconds: 1800
  agent_timeouts:
    plan_generator: 1800
    python_developer: 7200
    drupal_developer: 7200
  rules:
    blocked_paths:
      - "/dev/*"
      - "/proc/*"
      - "/sys/*"
      - "/etc/passwd"
      - "/etc/shadow"
    blocked_commands:
      - "rm -rf /"
    max_consecutive_repeats: 10
    path_boundary:
      enabled: true
      extra_allowed: []
agent_sdk:
  default_tools:
  - Read
  - Grep
  - Glob
  auto_edits: true
  planning_agent_tools:
  - Read
  - Grep
  - Glob
  - Bash(git *)
  implementation_agent_tools:
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash
environment:
  # Container runtime: "dood" (Phase 1) or "sysbox" (Phase 2, future)
  runtime: dood
  # Timeout in seconds waiting for services to become healthy
  health_timeout: 120
  # Auto-detect .lando.yml and start container environment
  auto_detect: true
  # Cleanup containers after execute completes
  auto_cleanup: true
  # Named volume shared between Sentinel and child containers
  volume_name: sentinel-projects
jira:
  # Restrict all Sentinel comments to this project role.
  # Set to null or remove to post unrestricted comments.
  comment_visibility_role: Employees
confidence:
  default_threshold: 95
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
