# Traefik dynamic configuration (file provider).
#
# Why a file provider instead of the Docker provider: Traefik 3.x hardcodes
# Docker API version 1.24 in its moby client. Docker Engine 29.x+ advertises
# MinAPIVersion 1.44, so every /v1.24/... call gets a 400 and Traefik never
# loads any routers. The file provider talks to no Docker daemon and is
# deterministic across engine versions.
#
# Route: Host(${SENTINEL_HOSTNAME}) → http://sentinel-serve:8787
# Traefik resolves sentinel-serve via Docker's embedded DNS on sentinel-edge.
# This is DNS-level discovery, not label-driven, so Traefik needs no Docker
# API access.

http:
  routers:
    sentinel:
      rule: "Host(`{{ env `SENTINEL_HOSTNAME` }}`)"
      entryPoints:
        - websecure
      tls:
        certResolver: le
      service: sentinel

  services:
    sentinel:
      loadBalancer:
        servers:
          - url: "http://sentinel-serve:8787"
        passHostHeader: true
